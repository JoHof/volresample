name: Build & Publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Build wheels via cibuildwheel (config lives in pyproject.toml)
  # ---------------------------------------------------------------------------
  build_wheels:
    name: Wheels / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-15-large = Intel x86_64, macos-15 = Apple Silicon ARM64
        os: [ubuntu-latest, windows-latest, macos-15]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # QEMU for Linux aarch64 cross-compilation
      - name: Set up QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        # All config (build targets, test-command, etc.) in [tool.cibuildwheel]

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Build source distribution
  # ---------------------------------------------------------------------------
  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Smoke-test: install each wheel on a fresh runner and verify import
  # (Heavy testing already runs inside cibuildwheel via test-command)
  # ---------------------------------------------------------------------------
  test_wheels:
    name: Test / ${{ matrix.os }} / py${{ matrix.python-version }}
    needs: build_wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-15]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-${{ matrix.os }}
          merge-multiple: true

      - name: Install wheel
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # --find-links lets pip pick the right wheel for this platform/version
          pip install volresample --no-index --find-links dist/

      - name: Smoke test
        run: |
          python -c "from volresample import resample; print('import ok')"
          python -c "import numpy as np; from volresample import resample; d = np.random.rand(8,8,8).astype(np.float32); r = resample(d, (4,4,4), mode='linear'); print(f'resample ok  {d.shape} -> {r.shape}')"

      - name: Run tests
        run: |
          pip install pytest numpy
          pytest tests/ -v --ignore=tests/torch_reference.py --ignore=tests/benchmark_resampling.py

  # ---------------------------------------------------------------------------
  # Publish to PyPI on tagged releases (v*)
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist, test_wheels]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    # Trusted publishing (OIDC) — configure at https://pypi.org/manage/project/volresample/settings/publishing/
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: "{wheels-*,sdist}"
          merge-multiple: true

      - name: Verify artifacts
        run: ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No password needed — uses OIDC trusted publishing
        # To fall back to API tokens, remove the environment block above and use:
        # with:
        #   password: ${{ secrets.PYPI_API_TOKEN }}
